global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse-exporter:9116']

  - job_name: 'spark'
    static_configs:
      - targets: ['processor:4040']
    metrics_path: '/metrics/prometheus'

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
      
  - job_name: 'spark_streaming'
    static_configs:
      - targets: ['processor:8888']